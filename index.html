<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>

body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{
max-width:900px;
padding:40px;
}

h1{
color:#ff9800;
font-size:48px;
}

h2{
color:#9fb3c8;
font-weight:normal;
}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{
background:#253041;
color:white;
}

.hidden{
display:none;
}

.status{
margin-top:15px;
color:#ff9800;
}

.small{
color:#9fb3c8;
font-size:14px;
}

pre{
text-align:left;
background:#0b0f1a;
padding:15px;
border-radius:8px;
overflow:auto;
max-height:500px;
}

.flex{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.half{
flex:1;
min-width:300px;
text-align:left;
}

.box{
padding:12px;
margin-top:10px;
background:#0b0f1a;
border-radius:8px;
border:1px solid #1f2a3a;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #253041;
text-align:left;
}

.event{
margin-top:10px;
padding:10px;
background:#111827;
border-radius:8px;
border:1px solid #253041;
}

</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<!-- LOGIN -->
<div id="authBox" class="card">

<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">

<h3>Commander Dashboard</h3>

<p id="userEmail" class="small"></p>

<p id="frontierStatus">
Checking Frontier...
</p>

<button onclick="connectFrontier()">
Connect Frontier
</button>

<button class="secondary" onclick="logout()">
Logout
</button>

<div id="dashStatus" class="status"></div>

</div>

<!-- PROFILE -->
<div id="profileBox" class="card hidden">

<h3>Frontier Profile</h3>

<div class="flex">

<!-- RAW -->
<div class="half">

<h4>Raw JSON</h4>

<pre id="journalData">
Loading...
</pre>

</div>

<!-- UI -->
<div class="half">

<h4>Structured View</h4>

<div id="profileUI"></div>

</div>

</div>

</div>

</div>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;

// =========================
// INIT
// =========================

async function init(){

session =
sessionStorage.getItem(
"auth_session"
);

if(!session) return;

await loadDashboard();
await loadProfile();

}

init();

// =========================
// DASHBOARD
// =========================

async function loadDashboard(){

const res =
await fetch(
API + "/me?session=" + session
);

if(!res.ok) return;

const data =
await res.json();

if(!data.logged) return;

document
.getElementById("authBox")
.classList.add("hidden");

document
.getElementById("dashboard")
.classList.remove("hidden");

document
.getElementById("userEmail")
.innerText =
"Logged as: " + data.email;

document
.getElementById("frontierStatus")
.innerText =
data.frontier
? "Frontier: CONNECTED ✔"
: "Frontier: NOT CONNECTED ✖";

}

// =========================
// PROFILE
// =========================

async function loadProfile(){

const res =
await fetch(
API + "/data?session=" + session
);

if(!res.ok) return;

const data =
await res.json();

const j =
data.journal || {};

const f =
data.fleetcarrier || {};

document
.getElementById("profileBox")
.classList.remove("hidden");

// RAW JSON
document
.getElementById("journalData")
.innerText =
JSON.stringify(
{
journal:j,
fleetcarrier:f
},
null,
2
);

// UI
document
.getElementById("profileUI")
.innerHTML =
renderProfile(j,f);

}

// =========================
// HEX
// =========================

function hexToText(hex){

if(!hex) return "";

let str = "";

for(
let i = 0;
i < hex.length;
i += 2
){

const code =
parseInt(
hex.substr(i,2),
16
);

if(!isNaN(code)){
str +=
String.fromCharCode(code);
}

}

return str;

}

// =========================
// LAST EVENTS
// =========================

function getLatestEvents(events){

const latest = {};

if(!Array.isArray(events))
return latest;

for(const ev of events){

if(!ev.event)
continue;

latest[ev.event] = ev;

}

return latest;

}

// =========================
// PROFILE RENDER
// =========================

function renderProfile(p, f){

const commander =
p.commander || {};

const ship =
p.ship || {};

const system =
p.lastSystem || {};

const station =
p.lastStarport || {};

const squadron =
p.squadron || {};

const fcName =
hexToText(
f?.name?.vanityName || ""
);

// =========================
// FC CARGO
// =========================

const cargo =
Array.isArray(f?.cargo)
? f.cargo
: [];

const cargoHtml =
cargo.map(c => `
<tr>
<td>${c.locName || c.commodity}</td>
<td>${c.qty ?? 0}</td>
</tr>
`).join("");

// =========================
// FC SERVICES
// =========================

const services =
f?.market?.services || {};

const selectedServices = {

carrierfuel:
"Carrier Fuel",

shipyard:
"Shipyard",

outfitting:
"Outfitting",

refuel:
"Refuel",

repair:
"Repair",

rearm:
"Rearm"

};

const servicesHtml =
Object.entries(selectedServices)
.map(([key,label]) => {

const value =
services[key];

if(value === undefined)
return "";

return `
<p>
<b>${label}:</b>
${value}
</p>
`;

})
.join("");

// =========================
// EVENTS
// =========================

const latest =
getLatestEvents(
p.events || []
);

const loadGame =
latest.LoadGame || {};

const loadout =
latest.Loadout || {};

const cargoEvent =
latest.Cargo || {};

// =========================
// RETURN HTML
// =========================

return `

<div class="box">

<h4>Commander</h4>

<p>
<b>Name:</b>
${commander.name ?? "-"}
</p>

<p>
<b>Credits:</b>
${Number(
commander.credits || 0
).toLocaleString()}
</p>

<p>
<b>Alive:</b>
${commander.alive ? "YES" : "NO"}
</p>

<p>
<b>Docked:</b>
${commander.docked ? "YES" : "NO"}
</p>

</div>

<div class="box">

<h4>Ship</h4>

<p>
<b>ID:</b>
${ship.id ?? "-"}
</p>

<p>
<b>Name:</b>
${ship.name ?? "-"}
</p>

<p>
<b>Free:</b>
${ship.free ? "YES" : "NO"}
</p>

<p>
<b>Alive:</b>
${ship.alive ? "YES" : "NO"}
</p>

<p>
<b>Cargo:</b>
${ship.value?.cargo ?? 0}
</p>

<p>
<b>Hull:</b>
${ship.health?.hull ?? 0}
</p>

<p>
<b>Shield:</b>
${ship.health?.shield ?? 0}
</p>

<p>
<b>Shield Up:</b>
${ship.health?.shieldup ? "YES" : "NO"}
</p>

<p>
<b>Cockpit Breached:</b>
${ship.cockpitBreached ? "YES" : "NO"}
</p>

<p>
<b>Oxygen Remaining:</b>
${ship.oxygenRemaining ?? 0}
</p>

<p>
<b>Station:</b>
${ship.station?.name ?? "-"}
</p>

<p>
<b>System:</b>
${ship.starsystem?.name ?? "-"}
</p>

</div>

<div class="box">

<h4>Last Known Location</h4>

<p>
<b>System:</b>
${system.name ?? "-"}
</p>

<p>
<b>Starport:</b>
${station.name ?? "-"}
</p>

</div>

<div class="box">

<h4>Squadron</h4>

<p>
<b>Name:</b>
${squadron.name ?? "-"}
</p>

<p>
<b>Tag:</b>
${squadron.tag ?? "-"}
</p>

<p>
<b>Rank:</b>
${squadron.rank ?? "-"}
</p>

</div>

<div class="box">

<h4>Fleet Carrier</h4>

<p>
<b>Callsign:</b>
${f?.name?.callsign ?? "-"}
</p>

<p>
<b>Name:</b>
${fcName || "-"}
</p>

<p>
<b>System:</b>
${f?.currentStarSystem ?? "-"}
</p>

<p>
<b>Balance:</b>
${Number(
f?.balance || 0
).toLocaleString()}
</p>

<p>
<b>Fuel:</b>
${f?.fuel ?? 0}
</p>

<p>
<b>Docking Access:</b>
${f?.dockingAccess ?? "-"}
</p>

<p>
<b>Free Cargo Space:</b>
${f?.capacity?.freeSpace ?? 0}
</p>

<p>
<b>Stored Cargo:</b>
${f?.capacity?.cargoNotForSale ?? 0}
</p>

</div>

<div class="box">

<h4>Fleet Carrier Services</h4>

${servicesHtml || "<p>No services</p>"}

</div>

<div class="box">

<h4>Fleet Carrier Cargo</h4>

<table>

<tr>
<th>Commodity</th>
<th>Qty</th>
</tr>

${cargoHtml || `
<tr>
<td colspan="2">
No cargo
</td>
</tr>
`}

</table>

</div>

<div class="box">

<h4>Latest Events</h4>

<div class="event">

<h5>LoadGame</h5>

<p>
<b>Commander:</b>
${loadGame.Commander ?? "-"}
</p>

<p>
<b>Ship:</b>
${loadGame.Ship_Localised ?? "-"}
</p>

<p>
<b>Fuel:</b>
${loadGame.FuelLevel ?? 0}
/
${loadGame.FuelCapacity ?? 0}
</p>

<p>
<b>Timestamp:</b>
${loadGame.timestamp ?? "-"}
</p>

</div>

<div class="event">

<h5>Loadout</h5>

<p>
<b>Ship ID:</b>
${loadout.ShipIdent ?? "-"}
</p>

<p>
<b>Hull Value:</b>
${Number(
loadout.HullValue || 0
).toLocaleString()}
</p>

<p>
<b>Modules Value:</b>
${Number(
loadout.ModulesValue || 0
).toLocaleString()}
</p>

<p>
<b>Cargo Capacity:</b>
${loadout.CargoCapacity ?? 0}
</p>

<p>
<b>Jump Range:</b>
${loadout.MaxJumpRange ?? 0}
</p>

<p>
<b>Timestamp:</b>
${loadout.timestamp ?? "-"}
</p>

</div>

<div class="event">

<h5>Cargo</h5>

<p>
<b>Vessel:</b>
${cargoEvent.Vessel ?? "-"}
</p>

<p>
<b>Count:</b>
${cargoEvent.Count ?? 0}
</p>

<p>
<b>Timestamp:</b>
${cargoEvent.timestamp ?? "-"}
</p>

</div>

</div>

`;

}

// =========================
// REGISTER
// =========================

async function register(){

const email =
document
.getElementById("email")
.value
.trim()
.toLowerCase();

const password =
document
.getElementById("password")
.value;

const res =
await fetch(
API + "/register",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
email,
password
})
}
);

const data =
await res.json();

document
.getElementById("authStatus")
.innerText =
data.error ||
"Account created ✔";

}

// =========================
// LOGIN
// =========================

async function login(){

const email =
document
.getElementById("email")
.value
.trim()
.toLowerCase();

const password =
document
.getElementById("password")
.value;

const res =
await fetch(
API + "/login",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
email,
password
})
}
);

const data =
await res.json();

if(data.error){

document
.getElementById("authStatus")
.innerText =
data.error;

return;

}

sessionStorage.setItem(
"auth_session",
data.session
);

session =
data.session;

await loadDashboard();
await loadProfile();

}

// =========================
// FRONTIER
// =========================

async function connectFrontier(){

const res =
await fetch(
API + "/frontier/start",
{
headers:{
Authorization:
"Bearer " + session
}
}
);

const data =
await res.json();

if(data.error){

document
.getElementById("dashStatus")
.innerText =
data.error;

return;

}

location.href =
data.url;

}

// =========================
// LOGOUT
// =========================

function logout(){

sessionStorage.removeItem(
"auth_session"
);

location.reload();

}

</script>

</body>
</html>
