<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{max-width:900px;padding:40px;}

h1{color:#ff9800;font-size:48px;}
h2{color:#9fb3c8;font-weight:normal;}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{background:#253041;color:white;}

.hidden{display:none;}

.status{margin-top:15px;color:#ff9800;}

.small{
color:#9fb3c8;
font-size:14px;
}

pre{
text-align:left;
background:#0b0f1a;
padding:15px;
border-radius:8px;
overflow:auto;
}

.flex{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.half{
flex:1;
min-width:300px;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<!-- LOGIN -->
<div id="authBox" class="card">

<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">

<h3>Commander Dashboard</h3>

<p id="userEmail" class="small"></p>

<p id="frontierStatus">Checking Frontier...</p>

<button onclick="connectFrontier()">
Connect Frontier
</button>

<button class="secondary" onclick="logout()">
Logout
</button>

<div id="dashStatus" class="status"></div>

</div>

<!-- PROFILE -->
<div id="profileBox" class="card hidden">

<h3>Frontier Profile</h3>

<div class="flex">

<!-- RAW JSON -->
<div class="half">
<h4>Raw JSON</h4>
<pre id="profileData">Loading...</pre>
</div>

<!-- UI VIEW -->
<div class="half" id="profileUI">
<h4>Structured View</h4>
</div>

</div>

</div>

</div>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;

// =========================
// INIT
// =========================

async function init(){

session = sessionStorage.getItem("auth_session");

if(!session) return;

await loadDashboard();
await loadProfile();
}

init();


// =========================
// DASHBOARD (/me)
// =========================

async function loadDashboard(){

const res =
await fetch(API + "/me?session=" + session);

if(!res.ok) return;

const data = await res.json();

if(!data.logged) return;

document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("userEmail").innerText =
"Logged as: " + data.email;

document.getElementById("frontierStatus").innerText =
data.frontier
? "Frontier: CONNECTED ✔"
: "Frontier: NOT CONNECTED ✖";
}


// =========================
// PROFILE (/data)
// =========================

async function loadProfile(){

const res =
await fetch(API + "/data?session=" + session);

if(!res.ok) return;

const data = await res.json();

const profile = data.profile || {};

document.getElementById("profileBox").classList.remove("hidden");

// RAW JSON
document.getElementById("profileData").innerText =
JSON.stringify(profile, null, 2);

// STRUCTURED UI
document.getElementById("profileUI").innerHTML =
renderProfile(profile);
}


// =========================
// RENDER PROFILE UI
// =========================

function renderProfile(p){

const commander = p.commander || {};
const ship = p.ship || {};
const system = p.lastSystem || {};

return `
<div>

<h4>Commander</h4>
<p><b>Name:</b> ${commander.name || "-"}</p>
<p><b>Credits:</b> ${commander.credits || 0}</p>
<p><b>Status:</b> ${commander.alive ? "Alive" : "Dead"}</p>
<p><b>Docked:</b> ${commander.docked ? "Yes" : "No"}</p>

<hr>

<h4>Ship</h4>
<p><b>Name:</b> ${ship.name || "-"}</p>
<p><b>Hull:</b> ${ship.value?.hull || 0}</p>
<p><b>Cargo:</b> ${ship.value?.cargo || 0}</p>
<p><b>Station:</b> ${ship.station?.name || "-"}</p>

<hr>

<h4>System</h4>
<p><b>Name:</b> ${system.name || "-"}</p>

</div>
`;
}


// =========================
// REGISTER
// =========================

async function register(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

document.getElementById("authStatus").innerText =
data.error || "Account created ✔";
}


// =========================
// LOGIN
// =========================

async function login(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.error){
document.getElementById("authStatus").innerText = data.error;
return;
}

sessionStorage.setItem("auth_session",data.session);
session = data.session;

await loadDashboard();
await loadProfile();
}


// =========================
// FRONTIER CONNECT
// =========================

async function connectFrontier(){

const res = await fetch(API + "/frontier/start",{
headers:{
Authorization:"Bearer " + session
}
});

const data = await res.json();

if(data.error){
document.getElementById("dashStatus").innerText = data.error;
return;
}

location.href = data.url;
}


// =========================
// LOGOUT
// =========================

function logout(){
sessionStorage.removeItem("auth_session");
location.reload();
}

</script>

</body>
</html>
