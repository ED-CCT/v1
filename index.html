<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{max-width:700px;padding:40px;}

h1{color:#ff9800;font-size:48px;}
h2{color:#9fb3c8;font-weight:normal;}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{background:#253041;color:white;}

.hidden{display:none;}

.status{margin-top:15px;color:#ff9800;}
</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<!-- LOGIN -->
<div id="authBox" class="card">

<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>
</div>

<!-- APP -->
<div id="appBox" class="card hidden">

<h3>Commander Panel</h3>

<button onclick="connectFrontier()">Connect Frontier</button>
<button class="secondary" onclick="logout()">Logout</button>

<div id="appStatus" class="status"></div>

</div>

</div>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

async function checkLogin(){

const session =
sessionStorage.getItem("auth_session");

if(!session) return;

const res =
await fetch(API + "/me?session=" + session);

if(!res.ok) return;

const data = await res.json();

if(data.logged){
showApp();
}
}

checkLogin();

// ---------------- LOGIN ----------------

async function register(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

document.getElementById("authStatus").innerText =
data.error || "Account created";
}

async function login(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if (data.error) {
document.getElementById("authStatus").innerText = data.error;
return;
}

if(data.session){
sessionStorage.setItem("auth_session",data.session);
showApp();
return;
}

document.getElementById("authStatus").innerText =
data.error || "Login failed";
}

// ---------------- UI ----------------

function showApp(){
document.getElementById("authBox").classList.add("hidden");
document.getElementById("appBox").classList.remove("hidden");
}

function logout(){
sessionStorage.removeItem("auth_session");
location.reload();
}

// ---------------- FRONTIER ----------------

async function connectFrontier(){

const session =
sessionStorage.getItem("auth_session");

const res = await fetch(API + "/frontier/start",{
headers:{
Authorization:"Bearer " + session
}
});

const data = await res.json();

if(data.url){
location.href = data.url;
}
}

</script>

</body>
</html>
