<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ED-CCT</title>
</head>
<body>

<h1>ED-CCT</h1>

<button onclick="login()">Login Frontier</button>

<script>
function login() {
  const clientId =
    "25bf7a3c-cee8-4b93-b42f-cb2137a7d110";

  const redirectUri =
    "https://elite-oauth.edcolonycommoditiestracker.workers.dev/callback";

  const url =
    "https://auth.frontierstore.net/auth" +
    "?response_type=code" +
    "&client_id=" + clientId +
    "&redirect_uri=" + encodeURIComponent(redirectUri) +
    "&scope=" + encodeURIComponent("AUTH CAPI");

  window.location.href = url;
}
</script>

</body>
</html>
