<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ED-CCT</title>

<style>
body{
margin:0;
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{max-width:900px;padding:40px;}

h1{color:#ff9800;font-size:48px;}
h2{color:#9fb3c8;font-weight:normal;}

.card{
margin-top:25px;
padding:25px;
border:1px solid #253041;
border-radius:12px;
background:#111827;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#1b2535;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff9800;
font-weight:bold;
}

.secondary{background:#253041;color:white;}

.hidden{display:none;}

.status{margin-top:15px;color:#ff9800;}

.small{
color:#9fb3c8;
font-size:14px;
}

pre{
text-align:left;
background:#0b0f1a;
padding:15px;
border-radius:8px;
overflow:auto;
}

.flex{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.half{
flex:1;
min-width:300px;
text-align:left;
}

.box{
padding:12px;
margin-top:10px;
background:#0b0f1a;
border-radius:8px;
border:1px solid #1f2a3a;
}
</style>
</head>

<body>

<div class="container">

<h1>ED-CCT</h1>
<h2>Elite Dangerous Tracker</h2>

<!-- LOGIN -->
<div id="authBox" class="card">

<h3>Login / Register</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="register()">Register</button>
<button class="secondary" onclick="login()">Login</button>

<div id="authStatus" class="status"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">

<h3>Commander Dashboard</h3>

<p id="userEmail" class="small"></p>

<p id="frontierStatus">Checking Frontier...</p>

<button onclick="connectFrontier()">
Connect Frontier
</button>

<button class="secondary" onclick="logout()">
Logout
</button>

<div id="dashStatus" class="status"></div>

</div>

<!-- PROFILE -->
<div id="profileBox" class="card hidden">

<h3>Frontier Profile</h3>

<div class="flex">

<!-- RAW -->
<div class="half">
<h4>Raw JSON</h4>
<pre id="profileData">Loading...</pre>
<pre id="marketData">Loading...</pre>
<pre id="shipyardData">Loading...</pre>
<pre id="journalData">Loading...</pre>
<pre id="fleetcarrierData">Loading...</pre>
<pre id="squadronData">Loading...</pre>
<pre id="communitygoalsData">Loading...</pre>
</div>

<!-- UI -->
<div class="half">
<h4>Structured View</h4>
<div id="profileUI"></div>
</div>

</div>

</div>

</div>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

let session = null;

// =========================
// INIT
// =========================

async function init(){

session = sessionStorage.getItem("auth_session");

if(!session) return;

await loadDashboard();
await loadProfile();
}

init();


// =========================
// DASHBOARD
// =========================

async function loadDashboard(){

const res =
await fetch(API + "/me?session=" + session);

if(!res.ok) return;

const data = await res.json();

if(!data.logged) return;

document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("userEmail").innerText =
"Logged as: " + data.email;

document.getElementById("frontierStatus").innerText =
data.frontier
? "Frontier: CONNECTED ✔"
: "Frontier: NOT CONNECTED ✖";
}


// =========================
// PROFILE
// =========================

async function loadProfile(){

const res =
await fetch(API + "/data?session=" + session);

if(!res.ok) return;

const data = await res.json();

const p = data.profile || {};
const m = data.market || {};
const j = data.journal || {};
const f = data.fleetcarrier || {};

document.getElementById("profileBox").classList.remove("hidden");

// RAW JSON
document.getElementById("profileData").innerText =
JSON.stringify(p, null, 2);
document.getElementById("marketData").innerText =
JSON.stringify(m, null, 2);
document.getElementById("journalData").innerText =
JSON.stringify(j, null, 2);
document.getElementById("fleetcarrierData").innerText =
JSON.stringify(f, null, 2);

// UI
document.getElementById("profileUI").innerHTML =
renderProfile(p);
}


// =========================
// PROFILE RENDER
// =========================

function renderProfile(p){

const commander = p.commander || {};
const ship = p.ship || {};
const system = p.lastSystem || {};
const station = p.lastStarport || {};
const squadron = p.squadron || {};

return `

<div class="box">
<h4>Commander</h4>
<p><b>Name:</b> ${commander.name ?? "-"}</p>
<p><b>Credits:</b> ${commander.credits ?? 0}</p>
<p><b>Alive:</b> ${commander.alive ?? false}</p>
<p><b>Docked:</b> ${commander.docked ?? false}</p>
</div>

<div class="box">
<h4>Ship</h4>
<p><b>ID:</b> ${ship.id ?? "-"}</p>
<p><b>Name:</b> ${ship.name ?? "-"}</p>
<p><b>Free:</b> ${ship.free ?? false}</p>
<p><b>Alive:</b> ${ship.alive ?? false}</p>

<p><b>Cargo:</b> ${ship.value?.cargo ?? 0}</p>

<p><b>Hull:</b> ${ship.health?.hull ?? 0}</p>
<p><b>Shield:</b> ${ship.health?.shield ?? 0}</p>
<p><b>Shield Up:</b> ${ship.health?.shieldup ?? false}</p>

<p><b>Cockpit Breached:</b> ${ship.cockpitBreached ?? false}</p>
<p><b>Oxygen Remaining:</b> ${ship.oxygenRemaining ?? 0}</p>

<p><b>Station:</b> ${ship.station?.name ?? "-"}</p>
<p><b>System:</b> ${ship.starsystem?.name ?? "-"}</p>
<p><small>ID: ${ship.starsystem?.systemaddress ?? "-"}</small></p>
</div>

<div class="box">
<h4>Last Known Location</h4>
<p><b>System:</b> ${system.name ?? "-"}</p>
<p><b>System ID:</b> ${system.id ?? "-"}</p>

<p><b>Starport:</b> ${station.name ?? "-"}</p>
<p><b>Starport ID:</b> ${station.id ?? "-"}</p>
</div>

<div class="box">
<h4>Squadron</h4>
<p><b>Name:</b> ${squadron.name ?? "-"}</p>
<p><b>Tag:</b> ${squadron.tag ?? "-"}</p>
<p><b>Rank:</b> ${squadron.rank ?? "-"}</p>
</div>

`;
}


// =========================
// REGISTER
// =========================

async function register(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

document.getElementById("authStatus").innerText =
data.error || "Account created ✔";
}


// =========================
// LOGIN
// =========================

async function login(){

const email =
document.getElementById("email").value.trim().toLowerCase();

const password =
document.getElementById("password").value;

const res = await fetch(API + "/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.error){
document.getElementById("authStatus").innerText = data.error;
return;
}

sessionStorage.setItem("auth_session",data.session);
session = data.session;

await loadDashboard();
await loadProfile();
}


// =========================
// FRONTIER
// =========================

async function connectFrontier(){

const res = await fetch(API + "/frontier/start",{
headers:{
Authorization:"Bearer " + session
}
});

const data = await res.json();

if(data.error){
document.getElementById("dashStatus").innerText = data.error;
return;
}

location.href = data.url;
}


// =========================
// LOGOUT
// =========================

function logout(){
sessionStorage.removeItem("auth_session");
location.reload();
}

</script>

</body>
</html>
