<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ED Journal Debug</title>

<style>

body{
background:#0b0f1a;
color:#e6edf3;
font-family:Arial;
padding:30px;
}

button{
padding:12px 18px;
background:#ff9800;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

pre{
margin-top:20px;
padding:20px;
background:#111827;
border-radius:12px;
overflow:auto;
white-space:pre-wrap;
word-break:break-word;
border:1px solid #253041;
}

.status{
margin-top:15px;
color:#ff9800;
}

</style>
</head>

<body>

<h1>ED Journal Debug</h1>

<button onclick="testJournal()">
Test Journal Endpoint
</button>

<div class="status" id="status"></div>

<pre id="out">Waiting...</pre>

<script>

const API =
"https://elite-oauth.edcolonycommoditiestracker.workers.dev";

async function testJournal(){

const out =
document.getElementById("out");

const status =
document.getElementById("status");

const session =
sessionStorage.getItem("auth_session");

if(!session){

status.innerText =
"No auth_session in sessionStorage";

return;
}

status.innerText =
"Loading...";

out.innerText =
"Fetching...";

try{

const res =
await fetch(
API + "/journal-debug?session=" + session
);

const text =
await res.json();

status.innerText =
"HTTP " + res.status;

out.innerText = text;

}catch(err){

status.innerText =
"Fetch failed";

out.innerText =
String(err);

}

}

</script>

</body>
</html>
