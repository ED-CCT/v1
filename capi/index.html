<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ED-CCT Data</title>
</head>
<body>

<h2>ED-CCT Data</h2>

<pre id="out">Loading...</pre>

<script>

const API =
  "https://elite-oauth.edcolonycommoditiestracker.workers.dev";

const out =
  document.getElementById("out");

const session =
  new URLSearchParams(location.search)
    .get("session");

if (!session) {

  out.innerText =
    "No session";

} else {

  load();
}

async function load() {

  try {

    out.innerText =
      "Loading data...";

    const url =
      `${API}/data?session=${session}`;

    console.log("FETCH:", url);

    const res =
      await fetch(url);

    console.log("STATUS:", res.status);

    const data =
  await res.json();
  
  out.innerText = JSON.stringify( data, null, 2 );

  } catch (err) {

    console.error(err);

    out.innerText =
      "ERROR:\n\n" + err;
  }
}

</script>

</body>
</html>
