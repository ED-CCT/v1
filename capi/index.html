<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ED-CCT Data</title>
</head>
<body>

<h2>ED-CCT Data</h2>

<pre id="out">Loading...</pre>

<script>
const API =
  "https://elite-oauth.edcolonycommoditiestracker.workers.dev";

const session =
  new URLSearchParams(location.search).get("session");

if (!session) {
  document.getElementById("out").innerText =
    "No session. Please login again.";
} else {
  load();
}

async function load() {
  try {
    const res = await fetch(
      `${API}/data?session=${session}`
    );

    const data = await res.json();

    document.getElementById("out").innerText =
      JSON.stringify(data, null, 2);

  } catch (e) {
    document.getElementById("out").innerText =
      "Error loading data";
  }
}
</script>

</body>
</html>
