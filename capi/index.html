<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ED-CCT Data</title>
</head>
<body>

<h2>ED-CCT Data</h2>

<pre id="out">Loading...</pre>

<script>c
  onst res = await fetch(`${API}/data?session=${session}`);

const text = await res.text();

console.log(res.status, text);

document.getElementById("out").innerText = text;
const API =
  "https://elite-oauth.edcolonycommoditiestracker.workers.dev";

const session =
  new URLSearchParams(location.search).get("session");

if (!session) {
  document.getElementById("out").innerText =
    "No session. Please login again.";
} else {
  load();
}

async function load() {
  try {

    const res = await fetch(
      `${API}/data?session=${session}`
    );

    const text = await res.text();

    console.log("STATUS:", res.status);
    console.log("RESPONSE:", text);

    document.getElementById("out").innerText =
      text;

  } catch (e) {

    console.log(e);

    document.getElementById("out").innerText =
      "Error loading data: " + e;
  }
}
</script>

</body>
</html>
